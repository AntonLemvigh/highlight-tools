name: HighlightTools
options:
  bundleIdPrefix: com.highlighttools
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

targets:
  HighlightTools:
    type: application
    platform: macOS
    sources:
      - path: HighlightTools
        excludes:
          - "**/.DS_Store"
          - "**/*.md"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.highlighttools.app
        PRODUCT_NAME: Highlight Tools
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        INFOPLIST_FILE: ""
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSMainNibFile: ""
        CODE_SIGN_ENTITLEMENTS: HighlightTools/App/HighlightTools.entitlements
        ENABLE_APP_SANDBOX: NO
        CODE_SIGN_IDENTITY: "-"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
